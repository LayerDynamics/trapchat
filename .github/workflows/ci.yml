name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: services/gateway/go.sum
      - name: Lint (go vet)
        run: go vet ./...
        working-directory: services/gateway
      - name: Test
        run: go test ./... -v
        working-directory: services/gateway

  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/relay/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Lint (cargo clippy)
        run: cargo clippy --workspace -- -D warnings
      - name: Test
        run: cargo test --workspace

  test-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/worker/package-lock.json
      - name: Install worker deps
        run: npm ci
        working-directory: services/worker
      - name: Lint worker
        run: |
          if ls .eslintrc* eslint.config.* 2>/dev/null | grep -q .; then
            npx eslint src/
          else
            echo "No ESLint config found, skipping lint"
          fi
        working-directory: services/worker
      - name: Test worker
        run: npm test
        working-directory: services/worker
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/trapchat/package-lock.json
      - name: Install frontend deps
        run: npm ci
        working-directory: apps/trapchat
      - name: Lint frontend
        run: |
          if ls .eslintrc* eslint.config.* 2>/dev/null | grep -q .; then
            npx eslint src/
          else
            echo "No ESLint config found, skipping lint"
          fi
        working-directory: apps/trapchat
      - name: Test frontend
        run: npm test -- --run
        working-directory: apps/trapchat
      - name: Build frontend
        run: npm run build
        working-directory: apps/trapchat

  security:
    runs-on: ubuntu-latest
    needs: [test-go, test-rust, test-node]
    steps:
      - uses: actions/checkout@v4
      # Rust dependency audit
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Audit Rust dependencies
        run: cargo audit
      # Go vulnerability check
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: services/gateway/go.sum
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Audit Go dependencies
        run: govulncheck ./...
        working-directory: services/gateway
      # Node dependency audits
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/worker/package-lock.json
      - name: Install worker deps
        run: npm ci
        working-directory: services/worker
      - name: Audit worker dependencies
        run: npm audit --audit-level=moderate
        working-directory: services/worker
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/trapchat/package-lock.json
      - name: Install frontend deps
        run: npm ci
        working-directory: apps/trapchat
      - name: Audit frontend dependencies
        run: npm audit --audit-level=moderate
        working-directory: apps/trapchat

  build-docker:
    runs-on: ubuntu-latest
    needs: [test-go, test-rust, test-node]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build

  integration:
    runs-on: ubuntu-latest
    needs: [build-docker]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose up -d
      - run: sleep 15
      - name: Check gateway health
        run: docker compose exec -T gateway wget -qO- http://localhost:8080/health
      - name: Check relay health
        run: docker compose exec -T relay wget -qO- http://localhost:9001/health
      - name: Check worker health
        run: docker compose exec -T worker wget -qO- http://localhost:9100/health
      - name: Check aggregated health
        run: docker compose exec -T gateway wget -qO- http://localhost:8080/health/all
      - run: docker compose down

