services:
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    expose:
      - "8080"
    environment:
      - GATEWAY_PORT=8080
      - RELAY_URL=ws://relay:9000
      - WORKER_URL=http://worker:9100
      - WORKER_AUTH_TOKEN=${WORKER_AUTH_TOKEN:?Set WORKER_AUTH_TOKEN in .env}
    restart: unless-stopped
    depends_on:
      relay:
        condition: service_healthy
      worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - trapchat

  relay:
    build:
      context: .
      dockerfile: services/relay/Dockerfile
    expose:
      - "9000"
      - "9001"
    environment:
      - RELAY_ADDR=0.0.0.0:9000
      - RELAY_HEALTH_ADDR=0.0.0.0:9001
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - trapchat

  worker:
    build:
      context: services/worker
      dockerfile: Dockerfile
    expose:
      - "9100"
    environment:
      - WORKER_PORT=9100
      - WORKER_AUTH_TOKEN=${WORKER_AUTH_TOKEN:?Set WORKER_AUTH_TOKEN in .env}
      - ALLOWED_CALLBACK_HOSTS=localhost,127.0.0.1,gateway
      - ALLOWED_GATEWAY_HOSTS=localhost,127.0.0.1,gateway
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9100/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - trapchat

  frontend:
    build:
      context: apps/trapchat
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - trapchat

networks:
  trapchat:
    driver: bridge
